upstream fs-java-backend {
    server app-server:8081;
}

upstream fs-bot-java-backend {
    server fs-notification-backend:8085;
}

upstream fs-bot-frontend-java-backend {
    server fs-notification-frontend:80;
}

server {
    server_name writer-link.by;

    listen 80;
    listen 443 ssl;

    resolver 127.0.0.11 ipv6=off;

    ssl_certificate         SSL_CERT;
    ssl_certificate_key     SSL_KEY;
    ssl_trusted_certificate SSL_CHAIN_CERT;

    client_max_body_size 100M;

    proxy_read_timeout 600;
    proxy_connect_timeout 10;
    proxy_send_timeout 600;

    location / {
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass http://fs-java-backend;
    }

    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;

        proxy_pass http://fs-java-backend;
    }

}

server {
    server_name bot.writer-link.by;

    listen 80;
    listen 443 ssl;

    resolver 127.0.0.11 ipv6=off;

    ssl_certificate         SSL_CERT;
    ssl_certificate_key     SSL_KEY;
    ssl_trusted_certificate SSL_CHAIN_CERT;

    location / {
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass http://fs-notification-frontend;
    }

    location /api/bot/ {
        proxy_set_header        Host $http_host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        proxy_pass http://fs-bot-java-backend;
    }
}